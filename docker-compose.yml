services:
  postgres:
    image: postgres:16
    container_name: fluxfx-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fluxfx
    ports:
      - "5432:5432"
    volumes:
      - fluxfx_pgdata:/var/lib/postgresql/data

volumes:
  fluxfx_pgdata:
